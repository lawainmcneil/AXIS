<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=./sherpa-intake.html" />
  <title>SHERPA Axis</title>
  <meta
    name="description"
    content="Open the SHERPA Axis client intake and portfolio planning dashboard."
  />
  <style>
    :root {
      color-scheme: light;
      --summit: #15241f;
      --pine: #245c44;
      --glacier: #dcefe7;
      --snow: #f7faf8;
      --rock: #53615b;
      --line: rgba(21, 36, 31, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: var(--snow);
      color: var(--summit);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(560px, calc(100% - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 32px;
      box-shadow: 0 18px 45px rgba(21, 36, 31, 0.12);
    }

    p {
      margin: 0;
      color: var(--rock);
    }

    .label {
      color: var(--pine);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 12px;
      font-size: clamp(2rem, 7vw, 3.2rem);
      line-height: 1;
      letter-spacing: 0;
    }

    a {
      display: inline-flex;
      margin-top: 22px;
      border-radius: 8px;
      background: var(--pine);
      color: #ffffff;
      font-weight: 900;
      padding: 12px 16px;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 3px solid var(--glacier);
      outline-offset: 3px;
    }

    .copyright {
      margin-top: 20px;
      font-size: 0.85rem;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <p class="label">SHERPA Axis</p>
    <h1>Opening Client Intake</h1>
    <p>The planning route starts with client inputs, then carries the household profile into the Axis dashboard.</p>
    <a href="./sherpa-intake.html">Open Intake</a>
    <p class="copyright">Copyright 2026 Sherpa Systems, LLC. All rights reserved.</p>
  </main>
</body>
</html>
